<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecomedano - Mangas de Riego Agrícola en San Juan</title>
    
    <!-- Metaetiquetas SEO y Open Graph -->
    <meta name="description" content="Mangas de riego agrícola de alta calidad. Venta directa en Médano de Oro, San Juan. Soluciones eficientes para el productor sanjuanino.">
    <meta property="og:title" content="Ecomedano - Mangas de Riego Agrícola">
    <meta property="og:description" content="Descubre el riego ideal para tu finca. Calculadora dinámica, mangas premium y atención directa en San Juan.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1595841696677-6489ff3f8cd1?auto=format&fit=crop&w=1200&q=80">
    <meta property="og:url" content="https://ecomedano.com.ar">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="es_AR">
    
    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: '#166534',
                        primaryLight: '#15803d',
                        secondary: '#22c55e',
                        accent: '#d9f99d',
                        dark: '#0f172a'
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(0,0,0,0.05)',
                        'glow': '0 4px 20px -2px rgba(34, 197, 94, 0.4)',
                        'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.07)'
                    }
                }
            }
        }
    </script>

    <!-- React y Babel -->
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
    
    <style>
        html { scroll-behavior: smooth; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-toast { animation: slideUp 0.3s ease-out forwards; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-[#f8fafc] text-gray-800 antialiased overflow-x-hidden selection:bg-secondary selection:text-white">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Íconos SVG Estilizados ---
        const IconCart = ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>;
        const IconPhone = ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>;
        const IconMapPin = ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
        const IconWhatsApp = ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>;
        const IconClose = ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        const IconTrash = ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>;
        const IconSettings = ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
        const IconUpload = ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;
        const IconStar = ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>;
        const IconCheck = ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
        const IconExternalLink = ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>;
        const IconCalculator = ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="14.01"/><line x1="12" y1="14" x2="12" y2="14.01"/><line x1="8" y1="14" x2="8" y2="14.01"/><line x1="16" y1="10" x2="16" y2="10.01"/><line x1="12" y1="10" x2="12" y2="10.01"/><line x1="8" y1="10" x2="8" y2="10.01"/><line x1="16" y1="18" x2="16" y2="18.01"/><line x1="12" y1="18" x2="12" y2="18.01"/><line x1="8" y1="18" x2="8" y2="18.01"/></svg>;
        const IconPackage = ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>;
        const IconPlus = ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        const IconMinus = ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        const IconInstagram = ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>;
        const IconFacebook = ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path></svg>;

        function EcomedanoApp() {
            // --- ESTADOS GLOBALES ---
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [toastMsg, setToastMsg] = useState(null);
            
            const [isAdminMode, setIsAdminMode] = useState(false);
            const [showAuthModal, setShowAuthModal] = useState(false);
            const [pinInput, setPinInput] = useState('');
            const [pinError, setPinError] = useState(false);
            
            const [isScrolled, setIsScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                handleScroll();
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);
            
            // --- PERSISTENCIA DE DATOS Y MIGRACIÓN CATEGORÍAS ---
            const [products, setProducts] = useState(() => {
                // v5 incluye el nuevo sistema de categorías (manga vs otro)
                const savedProducts = localStorage.getItem('ecomedano_products_v5');
                if (savedProducts) return JSON.parse(savedProducts);
                
                // Migración segura desde v4, v3 o v2
                const oldProducts = localStorage.getItem('ecomedano_products_v4') || localStorage.getItem('ecomedano_products_v3');
                if (oldProducts) {
                    const parsed = JSON.parse(oldProducts);
                    return parsed.map(p => ({
                        ...p,
                        category: p.category || 'manga', // <--- Asignamos 'manga' por defecto a lo anterior
                        inches: p.inches || '4',
                        stock: p.stock !== undefined ? p.stock : 20,
                        metersPerRoll: p.metersPerRoll || 50
                    }));
                }

                return [
                    { id: 1, category: 'manga', name: 'Manga de Riego 4"', inches: '4', metersPerRoll: 100, price: 15000, stock: 50, img: 'https://images.unsplash.com/photo-1590680415392-7d2d0b556f84?auto=format&fit=crop&w=600&q=80', clicks: 0 },
                    { id: 2, category: 'manga', name: 'Manga de Riego 6"', inches: '6', metersPerRoll: 50, price: 22000, stock: 30, img: 'https://images.unsplash.com/photo-1589939705384-5185137a7f0f?auto=format&fit=crop&w=600&q=80', clicks: 0 },
                    { id: 3, category: 'manga', name: 'Manga de Riego 8"', inches: '8', metersPerRoll: 50, price: 30000, stock: 15, img: 'https://images.unsplash.com/photo-1500937386664-56d1dfef3854?auto=format&fit=crop&w=600&q=80', clicks: 0 }
                ];
            });

            const [showBestSellers, setShowBestSellers] = useState(() => {
                return localStorage.getItem('ecomedano_show_best') !== 'false';
            });

            useEffect(() => {
                try { localStorage.setItem('ecomedano_products_v5', JSON.stringify(products)); } 
                catch (e) { console.warn("Memoria local llena."); }
            }, [products]);

            useEffect(() => { localStorage.setItem('ecomedano_show_best', showBestSellers); }, [showBestSellers]);

            useEffect(() => {
                document.body.style.overflow = (isCartOpen || showAuthModal) ? 'hidden' : 'unset';
            }, [isCartOpen, showAuthModal]);

            const showToast = (message) => {
                setToastMsg(message);
                setTimeout(() => setToastMsg(null), 3000);
            };

            // --- CALCULADORA DE RIEGO (Filtrada solo para 'mangas') ---
            const mangasOnly = useMemo(() => products.filter(p => p.category === 'manga'), [products]);
            
            const availableInches = useMemo(() => {
                return [...new Set(mangasOnly.map(p => p.inches))].filter(Boolean).sort((a, b) => Number(a) - Number(b));
            }, [mangasOnly]);

            const [calcMeters, setCalcMeters] = useState('');
            const [calcDiameter, setCalcDiameter] = useState(availableInches[0] || '');
            
            useEffect(() => {
                if (availableInches.length > 0 && !availableInches.includes(calcDiameter)) {
                    setCalcDiameter(availableInches[0]);
                } else if (availableInches.length === 0) {
                    setCalcDiameter('');
                }
            }, [availableInches, calcDiameter]);

            const calcSuggestedProduct = mangasOnly.find(p => p.inches === calcDiameter && p.stock > 0) || mangasOnly.find(p => p.inches === calcDiameter);
            const rollYield = calcSuggestedProduct?.metersPerRoll || 50;
            const calcRollsNeeded = calcMeters > 0 ? Math.ceil(calcMeters / rollYield) : 0;

            const handleAddCalcToCart = () => {
                if(calcRollsNeeded > 0 && calcSuggestedProduct) {
                    if (calcSuggestedProduct.stock <= 0) {
                        showToast(`El producto sugerido está sin stock temporalmente.`);
                        return;
                    }
                    const existingProduct = cart.find(item => item.id === calcSuggestedProduct.id);
                    const currentQty = existingProduct ? existingProduct.quantity : 0;
                    
                    if (currentQty + calcRollsNeeded > calcSuggestedProduct.stock) {
                        showToast(`Stock insuficiente. Solo quedan ${calcSuggestedProduct.stock} unidades.`);
                        return;
                    }

                    if (existingProduct) {
                        setCart(cart.map(item => item.id === calcSuggestedProduct.id ? { ...item, quantity: item.quantity + calcRollsNeeded } : item));
                    } else {
                        setCart([...cart, { ...calcSuggestedProduct, quantity: calcRollsNeeded }]);
                    }
                    setProducts(products.map(p => p.id === calcSuggestedProduct.id ? { ...p, clicks: (p.clicks || 0) + 1 } : p));
                    showToast(`Agregaste ${calcRollsNeeded} rollos al carrito`);
                }
            };

            // --- CARRITO Y CHECKOUT ---
            const [checkoutForm, setCheckoutForm] = useState({ name: '', zone: 'Médano de Oro', payment: 'Efectivo contra entrega' });

            const handleAddToCart = (product) => {
                if (product.stock <= 0) return;
                const existingProduct = cart.find(item => item.id === product.id);
                const currentQty = existingProduct ? existingProduct.quantity : 0;

                if (currentQty + 1 > product.stock) {
                    showToast(`Solo quedan ${product.stock} unidades disponibles.`);
                    return;
                }

                if (existingProduct) {
                    setCart(cart.map(item => item.id === product.id ? { ...item, quantity: item.quantity + 1 } : item));
                } else {
                    setCart([...cart, { ...product, quantity: 1 }]);
                }
                setProducts(products.map(p => p.id === product.id ? { ...p, clicks: (p.clicks || 0) + 1 } : p));
                showToast(`Agregaste: ${product.name}`);
            };

            const removeFromCart = (productId) => setCart(cart.filter(item => item.id !== productId));
            const totalCartItems = cart.reduce((total, item) => total + item.quantity, 0);
            const totalCartPrice = cart.reduce((total, item) => total + (item.price * item.quantity), 0);
            const WHATSAPP_NUMBER = "5492644049545";

            const handleCheckoutWhatsApp = () => {
                if(!checkoutForm.name.trim()){
                    showToast("Por favor, ingresa tu Nombre y Apellido.");
                    return;
                }
                const itemsList = cart.map(p => `- ${p.quantity}x ${p.name} ($${(p.price * p.quantity).toLocaleString('es-AR')})`).join('%0A');
                const text = `¡Hola Ecomedano! Soy *${checkoutForm.name.trim()}*.%0A%0A📦 *MI PEDIDO:*%0A${itemsList}%0A%0A💰 *Total a pagar:* $${totalCartPrice.toLocaleString('es-AR')}%0A📍 *Zona de Envío:* ${checkoutForm.zone}%0A💳 *Método de Pago:* ${checkoutForm.payment}%0A%0A¡Aguardo su confirmación para coordinar!`;
                window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${text}`, '_blank');
            };

            // --- LÓGICA DE ADMINISTRACIÓN ---
            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (pinInput === '1243') {
                    setIsAdminMode(true); setShowAuthModal(false); setPinInput(''); setPinError(false);
                } else {
                    setPinError(true);
                }
            };

            // Estados del formulario unificado
            const [newProdCategory, setNewProdCategory] = useState('manga'); // 'manga' o 'otro'
            const [newProdName, setNewProdName] = useState('');
            const [newProdPrice, setNewProdPrice] = useState('');
            const [newProdImg, setNewProdImg] = useState('');
            const [newProdInches, setNewProdInches] = useState('');
            const [newProdMeters, setNewProdMeters] = useState('50');
            const [newProdStock, setNewProdStock] = useState('');

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setNewProdImg(reader.result);
                    reader.readAsDataURL(file);
                }
            };

            const handleAddProduct = (e) => {
                e.preventDefault();
                if (!newProdName || !newProdPrice || !newProdInches || !newProdStock || !newProdMeters) return;
                
                const finalImage = newProdImg.trim() !== '' ? newProdImg : 'https://images.unsplash.com/photo-1464226184884-fa280b87c399?auto=format&fit=crop&w=600&q=80';
                const newProduct = { 
                    id: Date.now(), 
                    category: newProdCategory, // Se guarda la categoría seleccionada
                    name: newProdName, 
                    price: parseFloat(newProdPrice), 
                    inches: newProdInches.toString(),
                    metersPerRoll: parseInt(newProdMeters),
                    stock: parseInt(newProdStock),
                    img: finalImage, 
                    clicks: 0 
                };
                
                setProducts([...products, newProduct]);
                setNewProdName(''); setNewProdPrice(''); setNewProdImg(''); setNewProdInches(''); setNewProdStock(''); setNewProdMeters('50');
                showToast(newProdCategory === 'manga' ? "Manga de riego agregada" : "Accesorio agregado");
            };

            const handleDeleteProduct = (id) => {
                if(window.confirm("¿Seguro que deseas eliminar este producto?")) {
                    setProducts(products.filter(p => p.id !== id));
                    setCart(cart.filter(c => c.id !== id));
                }
            };

            const handleUpdateStockDelta = (id, delta) => {
                setProducts(products.map(p => {
                    if (p.id === id) {
                        const currentStock = p.stock === '' ? 0 : parseInt(p.stock);
                        return { ...p, stock: Math.max(0, currentStock + delta) };
                    }
                    return p;
                }));
            };

            const handleDirectStockUpdate = (id, value) => {
                if (value === '') {
                    setProducts(products.map(p => p.id === id ? { ...p, stock: '' } : p)); return;
                }
                const newStock = parseInt(value);
                if (!isNaN(newStock) && newStock >= 0) setProducts(products.map(p => p.id === id ? { ...p, stock: newStock } : p));
            };

            const handleStockBlur = (id, value) => {
                if (value === '' || isNaN(parseInt(value))) setProducts(products.map(p => p.id === id ? { ...p, stock: 0 } : p));
            };

            const topProducts = [...products].filter(p => (p.clicks || 0) > 0).sort((a, b) => (b.clicks || 0) - (a.clicks || 0)).slice(0, 3);

            // ==========================================
            // VISTA DEL PANEL DE ADMINISTRACIÓN
            // ==========================================
            if (isAdminMode) {
                return (
                    <div className="min-h-screen bg-gray-50 font-sans">
                        <header className="bg-dark text-white p-4 md:p-6 shadow-md sticky top-0 z-10">
                            <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                                <div className="flex items-center gap-3">
                                    <div className="p-2 bg-white/10 rounded-lg"><IconSettings className="w-6 h-6 text-accent" /></div>
                                    <div>
                                        <h2 className="text-xl md:text-2xl font-bold">Panel de Control</h2>
                                        <p className="text-xs text-gray-400">Administración Ecomedano</p>
                                    </div>
                                </div>
                                <button onClick={() => setIsAdminMode(false)} className="w-full md:w-auto bg-white/10 hover:bg-white/20 active:scale-95 text-white px-5 py-2.5 rounded-lg transition-all duration-300 font-medium flex items-center justify-center gap-2">
                                    <IconCart className="w-5 h-5" /> Volver a la Tienda
                                </button>
                            </div>
                        </header>

                        <div className="max-w-6xl mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div className="lg:col-span-1 space-y-6">
                                {/* FORMULARIO UNIFICADO DE CREACIÓN */}
                                <div className="bg-white rounded-2xl shadow-soft p-6 border border-gray-100 transition-all hover:shadow-lg duration-300">
                                    <h3 className="font-bold text-gray-800 text-lg mb-4">Agregar Producto</h3>
                                    
                                    {/* SELECTOR DE TIPO DE PRODUCTO */}
                                    <div className="flex gap-2 mb-6 bg-gray-100 p-1.5 rounded-xl border border-gray-200">
                                        <button type="button" onClick={() => setNewProdCategory('manga')} className={`flex-1 py-2.5 rounded-lg text-sm font-bold transition-all duration-300 ${newProdCategory === 'manga' ? 'bg-primary text-white shadow-md' : 'text-gray-500 hover:text-gray-800'}`}>Mangas</button>
                                        <button type="button" onClick={() => setNewProdCategory('otro')} className={`flex-1 py-2.5 rounded-lg text-sm font-bold transition-all duration-300 ${newProdCategory === 'otro' ? 'bg-purple-600 text-white shadow-md' : 'text-gray-500 hover:text-gray-800'}`}>Accesorios / Otros</button>
                                    </div>

                                    <form onSubmit={handleAddProduct} className="space-y-4">
                                        <div>
                                            <label className="text-sm font-semibold text-gray-600 mb-1 block">Nombre del Producto</label>
                                            <input type="text" value={newProdName} onChange={e => setNewProdName(e.target.value)} className="w-full border border-gray-300 rounded-lg p-3 text-sm focus:ring-2 focus:ring-primary focus:border-primary outline-none transition" placeholder={newProdCategory === 'manga' ? "Manga de 10 pulgadas" : "Ej: Cinta de atar"} required />
                                        </div>
                                        <div className="grid grid-cols-3 gap-3">
                                            <div>
                                                <label className="text-sm font-semibold text-gray-600 mb-1 block" title="Pulgadas">Medida</label>
                                                <input type="number" value={newProdInches} onChange={e => setNewProdInches(e.target.value)} className="w-full border border-gray-300 rounded-lg p-3 text-sm focus:ring-2 focus:ring-primary focus:border-primary outline-none transition" placeholder="Pulg." required />
                                            </div>
                                            <div>
                                                <label className="text-sm font-semibold text-gray-600 mb-1 block" title="Metros por rollo o unidad">Metros/R.</label>
                                                <input type="number" value={newProdMeters} onChange={e => setNewProdMeters(e.target.value)} className="w-full border border-gray-300 rounded-lg p-3 text-sm focus:ring-2 focus:ring-primary focus:border-primary outline-none transition" placeholder="Ej: 50" required />
                                            </div>
                                            <div>
                                                <label className="text-sm font-semibold text-gray-600 mb-1 block">Stock Inic.</label>
                                                <input type="number" min="0" value={newProdStock} onChange={e => setNewProdStock(e.target.value)} className="w-full border border-gray-300 rounded-lg p-3 text-sm focus:ring-2 focus:ring-primary focus:border-primary outline-none transition" placeholder="Ej: 50" required />
                                            </div>
                                        </div>
                                        <div>
                                            <label className="text-sm font-semibold text-gray-600 mb-1 block">Precio ($)</label>
                                            <input type="number" value={newProdPrice} onChange={e => setNewProdPrice(e.target.value)} className="w-full border border-gray-300 rounded-lg p-3 text-sm focus:ring-2 focus:ring-primary focus:border-primary outline-none transition" placeholder="35000" required />
                                        </div>
                                        <div>
                                            <label className="text-sm font-semibold text-gray-600 mb-2 block">Imagen URL (Opcional)</label>
                                            <input type="text" value={newProdImg} onChange={e => setNewProdImg(e.target.value)} className="w-full border border-gray-300 rounded-lg p-3 text-sm mb-2 outline-none" placeholder="https://..." />
                                            <label className="flex items-center justify-center gap-2 w-full bg-gray-50 hover:bg-gray-100 text-gray-600 border border-dashed border-gray-400 py-3 rounded-lg cursor-pointer transition text-sm font-medium">
                                                <IconUpload className="w-4 h-4" /> Subir desde dispositivo
                                                <input type="file" accept="image/*" onChange={handleImageUpload} className="hidden" />
                                            </label>
                                            {newProdImg && <img src={newProdImg} alt="Preview" className="mt-3 w-full h-24 object-cover rounded-lg border border-gray-200" />}
                                        </div>
                                        <button type="submit" className={`w-full font-bold py-3 rounded-lg shadow-md transition-all duration-300 active:scale-95 text-white ${newProdCategory === 'manga' ? 'bg-primary hover:bg-primaryLight' : 'bg-purple-600 hover:bg-purple-500'}`}>
                                            Guardar {newProdCategory === 'manga' ? 'Manga' : 'Accesorio'}
                                        </button>
                                    </form>
                                </div>
                                
                                <div className="bg-white rounded-2xl shadow-soft p-6 border border-gray-100 transition-all hover:shadow-lg duration-300">
                                    <div className="flex items-center gap-3 mb-4">
                                        <div className="p-2 bg-yellow-50 text-yellow-600 rounded-lg"><IconStar className="w-5 h-5" /></div>
                                        <h3 className="font-bold text-gray-800 text-lg">Marketing</h3>
                                    </div>
                                    <label className="flex items-center justify-between cursor-pointer group bg-gray-50 p-4 rounded-xl border border-gray-200 hover:border-green-300 transition">
                                        <span className="font-semibold text-gray-700 group-hover:text-primary transition">Mostrar Destacados</span>
                                        <div className="relative">
                                            <input type="checkbox" className="sr-only" checked={showBestSellers} onChange={(e) => setShowBestSellers(e.target.checked)} />
                                            <div className={`block w-14 h-8 rounded-full transition-colors ${showBestSellers ? 'bg-secondary' : 'bg-gray-300'}`}></div>
                                            <div className={`dot absolute left-1 top-1 bg-white w-6 h-6 rounded-full transition-transform ${showBestSellers ? 'transform translate-x-6' : ''}`}></div>
                                        </div>
                                    </label>
                                </div>
                            </div>

                            <div className="lg:col-span-2">
                                <div className="bg-white rounded-2xl shadow-soft p-6 border border-gray-100 h-full transition-all hover:shadow-lg duration-300">
                                    <div className="flex justify-between items-center mb-6 border-b pb-4">
                                        <h3 className="font-bold text-gray-800 text-xl">Inventario y Stock</h3>
                                        <span className="bg-green-100 text-primary px-3 py-1 rounded-full text-sm font-bold">{products.length} Productos</span>
                                    </div>

                                    <div className="space-y-4">
                                        {products.map(p => (
                                            <div key={p.id} className="flex flex-col sm:flex-row justify-between items-center bg-gray-50 border border-gray-100 rounded-xl p-4 hover:shadow-md transition duration-300 gap-4">
                                                <div className="flex items-center gap-4 w-full sm:w-auto">
                                                    <img src={p.img} alt={p.name} className="w-16 h-16 rounded-lg object-cover border border-gray-200 shadow-sm" />
                                                    <div>
                                                        <h4 className="font-bold text-gray-800">{p.name}</h4>
                                                        <p className="text-primary font-bold">${p.price.toLocaleString('es-AR')}</p>
                                                        <div className="flex gap-2">
                                                            <span className={`text-xs font-bold px-2 py-0.5 rounded-md mt-1 inline-block ${p.category === 'manga' ? 'bg-blue-100 text-blue-700' : 'bg-purple-100 text-purple-700'}`}>
                                                                {p.category === 'manga' ? 'Manga' : 'Accesorio'}
                                                            </span>
                                                            <span className="text-xs bg-gray-200 text-gray-600 px-2 py-0.5 rounded-md mt-1 inline-block">Medida: {p.inches}"</span>
                                                            <span className="text-xs bg-gray-200 text-gray-600 px-2 py-0.5 rounded-md mt-1 inline-block">Rinde: {p.metersPerRoll}m</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                
                                                <div className="flex items-center justify-between w-full sm:w-auto gap-4 md:gap-8">
                                                    <div className="flex flex-col items-center sm:items-start bg-white p-2 rounded-lg border border-gray-200 shadow-sm">
                                                        <span className="text-xs text-gray-500 font-bold uppercase tracking-wide mb-1 px-1">Stock Actual</span>
                                                        <div className="flex items-center gap-1">
                                                            <button onClick={() => handleUpdateStockDelta(p.id, -1)} className="p-1.5 bg-gray-100 hover:bg-gray-200 rounded text-gray-600 active:scale-95 transition"><IconMinus className="w-4 h-4" /></button>
                                                            <input 
                                                                type="number" 
                                                                value={p.stock} 
                                                                onChange={(e) => handleDirectStockUpdate(p.id, e.target.value)} 
                                                                onBlur={(e) => handleStockBlur(p.id, e.target.value)}
                                                                className="font-black text-gray-800 w-14 text-center bg-gray-50 border border-gray-200 rounded-md p-1 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all"
                                                            />
                                                            <button onClick={() => handleUpdateStockDelta(p.id, 1)} className="p-1.5 bg-gray-100 hover:bg-gray-200 rounded text-gray-600 active:scale-95 transition"><IconPlus className="w-4 h-4" /></button>
                                                        </div>
                                                    </div>

                                                    <button onClick={() => handleDeleteProduct(p.id)} className="text-red-500 hover:text-red-700 p-2.5 bg-white shadow-sm border border-red-100 hover:bg-red-50 active:scale-90 rounded-lg transition-all duration-300" title="Eliminar">
                                                        <IconTrash className="w-5 h-5" />
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                        {products.length === 0 && <p className="text-center text-gray-500 py-10">No hay productos en tu inventario.</p>}
                                    </div>
                                </div>
                            </div>
                        </div>
                        {toastMsg && (
                            <div className="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-dark text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 z-50 animate-toast">
                                <IconCheck className="w-5 h-5 text-secondary" />
                                <span className="font-medium text-sm">{toastMsg}</span>
                            </div>
                        )}
                    </div>
                );
            }

            // ==========================================
            // VISTA PÚBLICA (CLIENTE)
            // ==========================================
            return (
                <div className="relative font-sans">
                    {toastMsg && (
                        <div className="fixed bottom-24 md:bottom-10 left-1/2 transform -translate-x-1/2 bg-white text-gray-800 px-6 py-3 rounded-full shadow-[0_10px_40px_rgba(0,0,0,0.15)] border border-gray-100 flex items-center gap-3 z-50 animate-toast font-medium">
                            <div className="w-6 h-6 bg-secondary text-white rounded-full flex items-center justify-center"><IconCheck className="w-4 h-4" /></div>
                            {toastMsg}
                        </div>
                    )}

                    {showAuthModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                            <div className="bg-dark/80 backdrop-blur-sm absolute inset-0 transition-opacity" onClick={() => setShowAuthModal(false)}></div>
                            <div className="bg-white rounded-3xl p-8 z-10 w-full max-w-sm shadow-2xl relative">
                                <button onClick={() => setShowAuthModal(false)} className="absolute top-5 right-5 text-gray-400 hover:text-gray-800 bg-gray-100 hover:bg-gray-200 active:scale-90 rounded-full p-2 transition-all duration-300">
                                    <IconClose className="w-5 h-5" />
                                </button>
                                <div className="text-center mb-6">
                                    <div className="w-16 h-16 bg-green-50 text-primary rounded-2xl flex items-center justify-center mx-auto mb-4">
                                        <IconSettings className="w-8 h-8" />
                                    </div>
                                    <h3 className="text-2xl font-extrabold text-gray-800">Acceso Admin</h3>
                                    <p className="text-sm text-gray-500 mt-1">Ingresa tu PIN de seguridad</p>
                                </div>
                                <form onSubmit={handleAdminLogin}>
                                    <input type="password" autoFocus value={pinInput} onChange={(e) => { setPinInput(e.target.value); setPinError(false); }} className={`w-full border-2 ${pinError ? 'border-red-400 bg-red-50' : 'border-gray-200 bg-gray-50'} rounded-xl p-4 text-center text-3xl tracking-[0.5em] focus:ring-0 focus:border-primary outline-none transition mb-2 font-mono font-bold text-gray-700`} placeholder="••••" maxLength="4" />
                                    {pinError && <p className="text-red-500 text-sm text-center font-bold mb-2">PIN Incorrecto</p>}
                                    <button type="submit" className="w-full bg-primary hover:bg-primaryLight active:scale-95 text-white font-bold py-4 rounded-xl transition-all duration-300 shadow-lg shadow-green-900/20 mt-4 text-lg">Ingresar</button>
                                </form>
                            </div>
                        </div>
                    )}

                    <header className={`fixed top-0 left-0 w-full z-40 transition-all duration-500 ${isScrolled ? 'bg-white/95 backdrop-blur-md shadow-md py-3 border-b border-gray-100' : 'bg-transparent py-5'}`}>
                        <div className="max-w-7xl mx-auto px-4 flex justify-between items-center">
                            <div className="flex items-center gap-3 cursor-pointer group" onClick={() => window.scrollTo(0,0)}>
                                <div className="w-10 h-10 md:w-12 md:h-12 bg-primary rounded-xl flex items-center justify-center overflow-hidden shadow-md group-hover:scale-105 transition-transform duration-300">
                                    <img src="URL_DE_TU_IMAGEN_AQUI" alt="Logo Ecomedano" className="w-full h-full object-cover" />
                                    </div>
                                     <h1 className={`text-xl md:text-2xl font-extrabold tracking-tight transition-colors duration-300 ${isScrolled ? 'text-gray-900' : 'text-white drop-shadow-md'}`}>Ecomedano</h1>
                                    </div>
                            <nav className="hidden lg:flex gap-8 font-semibold text-sm">
                                <a href="#inicio" className={`transition-colors duration-300 hover:-translate-y-0.5 transform inline-block ${isScrolled ? 'text-gray-600 hover:text-primary' : 'text-gray-200 hover:text-white drop-shadow-sm'}`}>Inicio</a>
                                <a href="#calculadora" className={`transition-colors duration-300 hover:-translate-y-0.5 transform inline-block ${isScrolled ? 'text-gray-600 hover:text-primary' : 'text-gray-200 hover:text-white drop-shadow-sm'}`}>Calculadora</a>
                                <a href="#productos" className={`transition-colors duration-300 hover:-translate-y-0.5 transform inline-block ${isScrolled ? 'text-gray-600 hover:text-primary' : 'text-gray-200 hover:text-white drop-shadow-sm'}`}>Productos</a>
                                <a href="#galeria" className={`transition-colors duration-300 hover:-translate-y-0.5 transform inline-block ${isScrolled ? 'text-gray-600 hover:text-primary' : 'text-gray-200 hover:text-white drop-shadow-sm'}`}>En el campo</a>
                            </nav>
                            <button onClick={() => setIsCartOpen(true)} className={`relative p-2.5 rounded-xl transition-all duration-300 active:scale-95 group border ${isScrolled ? 'bg-gray-50 hover:bg-green-50 border-gray-200 hover:border-green-200' : 'bg-white/10 hover:bg-white/20 border-white/20 backdrop-blur-sm'}`}>
                                <IconCart className={`w-6 h-6 transition-colors duration-300 ${isScrolled ? 'text-gray-700 group-hover:text-primary' : 'text-white'}`} />
                                {totalCartItems > 0 && (
                                    <span className="absolute -top-2 -right-2 bg-secondary text-white text-xs font-bold rounded-full w-6 h-6 flex items-center justify-center shadow-lg ring-2 ring-white/50 transform scale-110">
                                        {totalCartItems}
                                    </span>
                                )}
                            </button>
                        </div>
                    </header>

                    {isCartOpen && (
                        <div className="fixed inset-0 z-50 flex justify-end">
                            <div className="bg-dark/60 backdrop-blur-sm absolute inset-0 transition-opacity" onClick={() => setIsCartOpen(false)}></div>
                            <div className="bg-white w-full md:w-[420px] shadow-2xl relative z-10 h-full flex flex-col transform transition-transform duration-300">
                                <div className="flex justify-between items-center p-5 md:p-6 border-b bg-gray-50/50">
                                    <h2 className="text-xl font-extrabold text-gray-900 flex items-center gap-2">
                                        <div className="p-2 bg-green-100 rounded-lg text-primary"><IconCart className="w-5 h-5" /></div> Tu Carrito
                                    </h2>
                                    <button onClick={() => setIsCartOpen(false)} className="p-2 bg-white border border-gray-200 hover:bg-gray-100 active:scale-90 rounded-full text-gray-500 transition-all duration-300 shadow-sm">
                                        <IconClose className="w-5 h-5" />
                                    </button>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto bg-gray-50/30">
                                    {cart.length === 0 ? (
                                        <div className="text-center text-gray-400 mt-24 flex flex-col items-center p-5">
                                            <div className="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center mb-6"><IconCart className="w-10 h-10" /></div>
                                            <p className="text-lg font-medium text-gray-500">Tu carrito está vacío.</p>
                                            <button onClick={() => setIsCartOpen(false)} className="mt-6 text-primary font-bold hover:underline">Ir a comprar</button>
                                        </div>
                                    ) : (
                                        <div className="p-5 md:p-6 space-y-4">
                                            {cart.map(item => (
                                                <div key={item.id} className="flex gap-4 items-center bg-white p-4 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-shadow duration-300">
                                                    <img src={item.img} alt={item.name} className="w-16 h-16 object-cover rounded-xl border border-gray-50" />
                                                    <div className="flex-1">
                                                        <h4 className="font-bold text-gray-800 text-sm md:text-base leading-tight">{item.name}</h4>
                                                        <p className="text-primary font-extrabold mt-1">${item.price.toLocaleString('es-AR')}</p>
                                                        <div className="flex items-center gap-2 mt-2">
                                                            <span className="text-xs font-bold bg-gray-100 px-2 py-1 rounded-md text-gray-600">Cant: {item.quantity}</span>
                                                        </div>
                                                    </div>
                                                    <button onClick={() => removeFromCart(item.id)} className="text-red-400 hover:text-red-600 p-2.5 bg-red-50 hover:bg-red-100 active:scale-90 rounded-xl transition-all duration-300">
                                                        <IconTrash className="w-5 h-5" />
                                                    </button>
                                                </div>
                                            ))}
                                            
                                            <div className="mt-6 border-t border-dashed border-gray-300 pt-6">
                                                <h3 className="font-bold text-gray-800 mb-4 text-sm uppercase tracking-wide flex items-center gap-2">
                                                    <IconMapPin className="w-4 h-4 text-primary"/> Datos de Envío
                                                </h3>
                                                <div className="space-y-3">
                                                    <input type="text" placeholder="Tu Nombre y Apellido" value={checkoutForm.name} onChange={(e) => setCheckoutForm({...checkoutForm, name: e.target.value})} className="w-full border border-gray-200 rounded-xl p-3.5 text-sm focus:ring-2 focus:ring-primary outline-none transition shadow-sm" required />
                                                    <div className="relative">
                                                        <select value={checkoutForm.zone} onChange={(e) => setCheckoutForm({...checkoutForm, zone: e.target.value})} className="w-full border border-gray-200 rounded-xl p-3.5 text-sm focus:ring-2 focus:ring-primary outline-none transition shadow-sm appearance-none bg-white">
                                                            <option value="Médano de Oro">Médano de Oro [Destacado]</option>
                                                            <option value="Rawson">Rawson</option>
                                                            <option value="Pocito">Pocito</option>
                                                            <option value="Capital">Capital</option>
                                                            <option value="Chimbas">Chimbas</option>
                                                            <option value="Albardón">Albardón</option>
                                                            <option value="Otros">Otros (Consultar)</option>
                                                        </select>
                                                    </div>
                                                    <div className="relative">
                                                        <select value={checkoutForm.payment} onChange={(e) => setCheckoutForm({...checkoutForm, payment: e.target.value})} className="w-full border border-gray-200 rounded-xl p-3.5 text-sm focus:ring-2 focus:ring-primary outline-none transition shadow-sm appearance-none bg-white">
                                                            <option value="Efectivo contra entrega">Efectivo contra entrega</option>
                                                            <option value="Transferencia bancaria">Transferencia bancaria</option>
                                                        </select>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>

                                {cart.length > 0 && (
                                    <div className="border-t p-5 md:p-6 bg-white shadow-[0_-15px_30px_rgba(0,0,0,0.03)] z-20">
                                        <div className="flex justify-between items-center mb-5 border-b border-gray-100 pb-4">
                                            <span className="text-gray-500 font-medium">Total a pagar:</span>
                                            <span className="text-2xl font-black text-gray-900">${totalCartPrice.toLocaleString('es-AR')}</span>
                                        </div>
                                        <button onClick={handleCheckoutWhatsApp} className="w-full bg-[#25D366] hover:bg-[#20bd5a] hover:-translate-y-1 active:scale-95 text-white font-bold py-4 rounded-xl transition-all duration-300 flex items-center justify-center gap-3 shadow-glow text-lg">
                                            <IconWhatsApp className="w-6 h-6" /> Enviar por WhatsApp
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    <section id="inicio" className="relative pt-32 pb-24 md:pt-40 md:pb-32 px-4 text-center bg-cover bg-center min-h-[70vh] md:min-h-[85vh] flex items-center justify-center" style={{ backgroundImage: "url('https://images.unsplash.com/photo-1595841696677-6489ff3f8cd1?auto=format&fit=crop&w=1920&q=80')" }}>
                        <div className="absolute inset-0 bg-gradient-to-b from-dark/80 via-dark/50 to-primary/80"></div>
                        <div className="relative z-10 max-w-4xl mx-auto mt-10 md:mt-0">
                            <a href="https://www.google.com/maps/search/?api=1&query=Médano+de+Oro,+San+Juan" target="_blank" rel="noreferrer" className="inline-flex items-center gap-2 py-1.5 px-4 rounded-full bg-white/10 backdrop-blur-md text-accent text-xs md:text-sm font-bold tracking-wider mb-6 border border-white/20 shadow-glass hover:bg-white/20 transition-all duration-300 hover:scale-105 group">
                                <IconMapPin className="w-4 h-4 group-hover:scale-110 transition-transform" /> MÉDANO DE ORO, SAN JUAN <IconExternalLink className="w-3 h-3 ml-1 opacity-70" />
                            </a>
                            <h2 className="text-5xl md:text-7xl lg:text-8xl font-black text-white mb-6 tracking-tight leading-[1.1] drop-shadow-2xl">
                                El riego ideal <br className="hidden md:block"/>para tu tierra.
                            </h2>
                            <p className="text-lg md:text-2xl text-gray-200 mb-10 font-light max-w-2xl mx-auto px-4 leading-relaxed">Mangas de calidad premium con atención humana, directa y enfocada en el agricultor local.</p>
                            <a href="#productos" className="inline-flex items-center gap-2 bg-secondary text-white font-bold py-4 px-10 rounded-full shadow-glow transition-all duration-300 transform hover:-translate-y-1 active:scale-95 text-lg">
                                <IconCart className="w-5 h-5" /> Ver Catálogo
                            </a>
                        </div>
                        <div className="absolute bottom-0 left-0 right-0 w-full overflow-hidden leading-[0] translate-y-[1px]">
                            <svg viewBox="0 0 1440 320" preserveAspectRatio="none" className="w-full h-[60px] md:h-[120px] block">
                                <path fill="#f8fafc" fillOpacity="1" d="M0,128L48,138.7C96,149,192,171,288,165.3C384,160,480,128,576,133.3C672,139,768,181,864,181.3C960,181,1056,139,1152,122.7C1248,107,1344,117,1392,122.7L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
                            </svg>
                        </div>
                    </section>

                    <section id="calculadora" className="bg-[#f8fafc] py-12 px-4 -mt-8 relative z-20">
                        <div className="max-w-4xl mx-auto">
                            <div className="bg-white rounded-3xl shadow-soft border border-gray-100 p-8 md:p-12 transition-all hover:shadow-[0_20px_50px_rgba(0,0,0,0.08)] duration-500">
                                <div className="text-center mb-8">
                                    <div className="w-16 h-16 bg-green-50 text-primary rounded-2xl flex items-center justify-center mx-auto mb-4">
                                        <IconCalculator className="w-8 h-8" />
                                    </div>
                                    <h3 className="text-2xl md:text-3xl font-black text-gray-900">Calculadora de Riego</h3>
                                    <p className="text-gray-500 mt-2">Ingresa los metros de tu surco para sugerirte el material exacto basado en su rendimiento.</p>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
                                    <div className="space-y-6">
                                        <div>
                                            <label className="text-sm font-bold text-gray-700 mb-2 block flex justify-between">
                                                <span>Diámetro de manga deseado</span>
                                                {availableInches.length === 0 && <span className="text-red-500 text-xs">Sin inventario de mangas</span>}
                                            </label>
                                            <div className="flex flex-wrap gap-3">
                                                {availableInches.map(size => (
                                                    <button key={size} onClick={() => setCalcDiameter(size)} className={`py-3 px-6 rounded-xl font-bold border transition-all duration-300 active:scale-95 flex-1 ${calcDiameter === size ? 'bg-primary text-white border-primary shadow-md' : 'bg-gray-50 text-gray-600 border-gray-200 hover:border-primary hover:text-primary'}`}>
                                                        {size}"
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                        <div>
                                            <label className="text-sm font-bold text-gray-700 mb-2 block">Longitud a regar (Metros)</label>
                                            <input type="number" min="0" placeholder="Ej: 500" value={calcMeters} onChange={(e) => setCalcMeters(e.target.value)} className="w-full border border-gray-200 rounded-xl p-4 text-lg font-medium focus:ring-2 focus:ring-primary outline-none transition shadow-sm bg-gray-50 focus:bg-white" />
                                        </div>
                                    </div>

                                    <div className="bg-gray-50 rounded-2xl p-6 border border-gray-100 flex flex-col justify-center h-full">
                                        <div className="text-center">
                                            <p className="text-sm text-gray-500 font-medium mb-1">Resultado estimado:</p>
                                            <h4 className="text-4xl font-black text-primary mb-2">
                                                {calcRollsNeeded > 0 ? `${calcRollsNeeded} ${calcRollsNeeded === 1 ? 'Rollo' : 'Rollos'}` : '-'}
                                            </h4>
                                            <p className="text-sm font-bold text-gray-700 mb-6 min-h-[20px]">
                                                {calcRollsNeeded > 0 && calcSuggestedProduct ? `de ${calcSuggestedProduct.name} (rinde ${rollYield}m/rollo)` : 'Ingresa los metros arriba'}
                                            </p>
                                            
                                            <button onClick={handleAddCalcToCart} disabled={calcRollsNeeded === 0 || !calcSuggestedProduct || calcSuggestedProduct.stock <= 0} className={`w-full font-bold py-4 rounded-xl transition-all duration-300 flex items-center justify-center gap-2 text-lg ${calcRollsNeeded > 0 && calcSuggestedProduct && calcSuggestedProduct.stock > 0 ? 'bg-secondary text-white hover:bg-green-500 hover:-translate-y-1 active:scale-95 shadow-glow' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>
                                                <IconCart className="w-5 h-5" /> Añadir Sugerencia
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {showBestSellers && topProducts.length > 0 && (
                        <section className="bg-[#f8fafc] pt-12 pb-6 px-4">
                            <div className="max-w-6xl mx-auto">
                                <div className="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                                    <div className="flex items-center gap-3">
                                        <div className="p-3 bg-gradient-to-br from-yellow-400 to-orange-500 text-white rounded-xl shadow-lg transform -rotate-6">
                                            <IconStar className="w-6 h-6" />
                                        </div>
                                        <div>
                                            <h3 className="text-2xl md:text-3xl font-black text-gray-900">Más Vendidos</h3>
                                            <p className="text-gray-500 font-medium text-sm md:text-base">Los favoritos de nuestros clientes.</p>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {topProducts.map((product, index) => (
                                        <div key={`top-${product.id}`} className="bg-white rounded-2xl shadow-soft border border-yellow-100 overflow-hidden flex items-center p-4 gap-4 relative group hover:-translate-y-1 transition-transform duration-300">
                                            <div className="absolute top-0 right-0 bg-yellow-400 text-yellow-900 text-xs font-black px-3 py-1 rounded-bl-xl z-10">#{index + 1}</div>
                                            <img src={product.img} alt={product.name} className="w-24 h-24 rounded-xl object-cover" />
                                            <div className="flex-1">
                                                <h4 className="font-bold text-gray-800 leading-tight mb-1">{product.name}</h4>
                                                <p className="text-primary font-black mb-2">${product.price.toLocaleString('es-AR')}</p>
                                                <button onClick={() => handleAddToCart(product)} disabled={product.stock <= 0} className={`text-xs font-bold px-3 py-1.5 rounded-lg transition-all duration-300 w-full text-center active:scale-95 border ${product.stock > 0 ? 'bg-gray-50 hover:bg-primary text-primary hover:text-white border-gray-200' : 'bg-gray-100 text-gray-400 border-gray-200 cursor-not-allowed'}`}>
                                                    {product.stock > 0 ? 'Agregar' : 'Sin Stock'}
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>
                    )}

                    <section id="productos" className="bg-[#f8fafc] py-16 md:py-24 px-4">
                        <div className="max-w-6xl mx-auto">
                            <div className="text-center mb-12 md:mb-16">
                                <span className="text-secondary font-bold tracking-widest uppercase text-sm mb-2 block">Inventario</span>
                                <h3 className="text-3xl md:text-4xl font-black text-gray-900 mb-4">Nuestro Catálogo</h3>
                                <div className="w-20 h-1.5 bg-primary mx-auto rounded-full"></div>
                            </div>
                            
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8 md:gap-10">
                                {products.map(product => {
                                    const outOfStock = product.stock <= 0;
                                    return (
                                        <div key={product.id} className={`bg-white rounded-3xl shadow-soft border border-gray-100 overflow-hidden transition-all duration-500 flex flex-col group relative ${outOfStock ? 'opacity-80' : 'hover:shadow-[0_20px_50px_rgba(0,0,0,0.1)] hover:-translate-y-2'}`}>
                                            
                                            <div className="absolute top-4 left-4 flex flex-col gap-2 z-20">
                                                <div className="bg-white/95 backdrop-blur-sm text-gray-800 text-xs font-black px-3 py-1.5 rounded-lg shadow-sm border border-gray-100 flex items-center gap-1.5">
                                                    <IconPackage className={`w-3 h-3 ${outOfStock ? 'text-red-500' : 'text-primary'}`} />
                                                    {outOfStock ? <span className="text-red-500 uppercase">Sin Stock</span> : <span>Stock: {product.stock} u.</span>}
                                                </div>
                                                {/* ETIQUETA EXCLUSIVA PARA ACCESORIOS */}
                                                {product.category === 'otro' && (
                                                    <div className="bg-purple-600/90 backdrop-blur-sm text-white text-xs font-black px-3 py-1.5 rounded-lg shadow-sm flex items-center gap-1.5 w-max">
                                                        Accesorio
                                                    </div>
                                                )}
                                            </div>

                                            <div className="overflow-hidden relative h-64">
                                                <div className="absolute inset-0 bg-dark/5 group-hover:bg-transparent transition duration-500 z-10"></div>
                                                <img src={product.img} alt={product.name} className={`w-full h-full object-cover transition duration-700 ease-out ${outOfStock ? 'grayscale' : 'transform group-hover:scale-110'}`} />
                                            </div>
                                            <div className="p-6 md:p-8 flex-1 flex flex-col justify-between relative bg-white">
                                                <div className="mb-6">
                                                    <h4 className="text-xl md:text-2xl font-bold text-gray-800 mb-2">{product.name}</h4>
                                                    <p className={`font-black text-3xl ${outOfStock ? 'text-gray-400' : 'text-primary'}`}>${product.price.toLocaleString('es-AR')}</p>
                                                </div>
                                                <button onClick={() => handleAddToCart(product)} disabled={outOfStock} className={`w-full border-2 font-bold py-4 rounded-xl transition-all duration-300 flex items-center justify-center gap-2 active:scale-95 ${outOfStock ? 'bg-gray-100 border-gray-200 text-gray-400 cursor-not-allowed' : 'bg-gray-50 border-gray-200 text-gray-800 hover:border-primary hover:bg-primary hover:text-white group-hover:shadow-glow'}`}>
                                                    <IconCart className="w-5 h-5" /> {outOfStock ? 'Agotado' : 'Añadir al Carrito'}
                                                </button>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </section>

                    <section id="galeria" className="py-24 bg-white px-4 border-t border-gray-100">
                        <div className="max-w-6xl mx-auto">
                            <div className="text-center mb-12">
                                <span className="text-secondary font-bold tracking-widest uppercase text-sm mb-2 block">Autenticidad</span>
                                <h3 className="text-3xl md:text-4xl font-black text-gray-900 mb-4">Directo en el Campo</h3>
                                <p className="text-gray-500 max-w-2xl mx-auto">Nuestros productos trabajando donde más importa: en las fincas de nuestros productores.</p>
                                <div className="w-20 h-1.5 bg-primary mx-auto rounded-full mt-6"></div>
                            </div>
                            
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
                                <div className="col-span-2 row-span-2 overflow-hidden rounded-3xl relative group shadow-sm">
                                    <div className="absolute inset-0 bg-black/20 group-hover:bg-black/0 transition duration-500 z-10"></div>
                                    <img src="https://images.unsplash.com/photo-1590680415392-7d2d0b556f84?auto=format&fit=crop&w=800&q=80" alt="Instalación en campo" className="w-full h-full object-cover transform group-hover:scale-105 transition duration-700" />
                                </div>
                                <div className="overflow-hidden rounded-3xl relative group shadow-sm h-48 md:h-64">
                                    <div className="absolute inset-0 bg-black/20 group-hover:bg-black/0 transition duration-500 z-10"></div>
                                    <img src="https://images.unsplash.com/photo-1589939705384-5185137a7f0f?auto=format&fit=crop&w=400&q=80" alt="Cultivo y mangas" className="w-full h-full object-cover transform group-hover:scale-105 transition duration-700" />
                                </div>
                                <div className="overflow-hidden rounded-3xl relative group shadow-sm h-48 md:h-64">
                                    <div className="absolute inset-0 bg-black/20 group-hover:bg-black/0 transition duration-500 z-10"></div>
                                    <img src="https://images.unsplash.com/photo-1500937386664-56d1dfef3854?auto=format&fit=crop&w=400&q=80" alt="Surcos preparados" className="w-full h-full object-cover transform group-hover:scale-105 transition duration-700" />
                                </div>
                                <div className="col-span-2 overflow-hidden rounded-3xl relative group shadow-sm h-48 md:h-64">
                                    <div className="absolute inset-0 bg-black/20 group-hover:bg-black/0 transition duration-500 z-10"></div>
                                    <img src="https://images.unsplash.com/photo-1625246333195-78d9c38ad449?auto=format&fit=crop&w=800&q=80" alt="Riego en acción" className="w-full h-full object-cover transform group-hover:scale-105 transition duration-700" />
                                </div>
                            </div>
                        </div>
                    </section>

                    <footer id="contacto" className="bg-dark text-white pt-16 pb-8 px-4 border-t-4 border-secondary relative">
                        <div className="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-12 text-center md:text-left mb-16">
                            <div>
                                <div className="flex items-center justify-center md:justify-start gap-3 mb-6">
                                        <div className="w-10 h-10 bg-primary rounded-xl flex items-center justify-center overflow-hidden shadow-md">
                                            <img src="URL_DE_TU_IMAGEN_AQUI" alt="Logo Ecomedano" className="w-full h-full object-cover" />
                                        </div>
                                             <h4 className="text-2xl font-bold tracking-tight">Ecomedano</h4>
                                        </div>
                                <p className="text-gray-400 text-sm leading-relaxed max-w-sm mx-auto md:mx-0">Tu aliado estratégico para un riego eficiente en Médano de Oro. Calidad garantizada directamente en el campo.</p>
                            </div>
                            <div>
                                <h4 className="text-lg font-bold mb-6 text-white uppercase tracking-widest">Contacto</h4>
                                <div className="space-y-4 text-gray-400 font-medium">
                                    <a href={`tel:+${WHATSAPP_NUMBER}`} className="flex items-center justify-center md:justify-start gap-3 hover:text-secondary transition"><IconPhone className="w-5 h-5 text-secondary" /> +54 9 264 404-9545</a>
                                    <a href="https://www.instagram.com/ecomedano/" target="_blank" rel="noreferrer" className="flex items-center justify-center md:justify-start gap-3 hover:text-secondary transition"><IconInstagram className="w-5 h-5 text-secondary" /> Instagram</a>
                                    <a href="https://www.facebook.com/tu_perfil" target="_blank" rel="noreferrer" className="flex items-center justify-center md:justify-start gap-3 hover:text-secondary transition"><IconFacebook className="w-5 h-5 text-secondary" /> Facebook</a>
                                </div>
                            </div>
                            <div>
                                <h4 className="text-lg font-bold mb-6 text-white uppercase tracking-widest">Ubicación</h4>
                                <a href="https://www.google.com/maps/search/?api=1&query=Ramón+Franco+entre+6+y+7,+Médano+de+Oro,+San+Juan" 
                                   target="_blank" rel="noreferrer" 
                                   className="flex items-start justify-center md:justify-start gap-3 text-gray-400 font-medium hover:text-white transition group">
                                    <IconMapPin className="w-6 h-6 text-secondary shrink-0 group-hover:scale-110 transition-transform" />
                                    <span className="text-left flex flex-col">
                                        Ramón Franco entre 6 y 7, <br/>Médano de Oro, San Juan.
                                        <span className="text-xs text-secondary mt-1 flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                            Ver en el mapa <IconExternalLink className="w-3 h-3" />
                                        </span>
                                    </span>
                                </a>
                            </div>
                        </div>
                        
                        <div className="max-w-6xl mx-auto border-t border-gray-800/50 pt-8 flex flex-col md:flex-row justify-between items-center gap-4 text-sm text-gray-500 font-medium">
                            <p>&copy; {new Date().getFullYear()} Ecomedano. Todos los derechos reservados.</p>
                            <button onClick={() => setShowAuthModal(true)} className="hover:text-white transition-colors flex items-center gap-2 bg-gray-800/50 hover:bg-gray-700 px-4 py-2 rounded-xl active:scale-95" title="Acceso al panel de control">
                                <IconSettings className="w-4 h-4" /> Ingreso Admin
                            </button>
                        </div>
                    </footer>

                    {!isCartOpen && (
                        <a href={`https://wa.me/${WHATSAPP_NUMBER}?text=Hola%20Ecomedano,%20tengo%20una%20consulta.`} target="_blank" rel="noreferrer" className="fixed bottom-6 right-6 md:bottom-8 md:right-8 bg-[#25D366] text-white p-4 rounded-full shadow-glow hover:scale-110 active:scale-95 transition-all duration-300 z-30 flex items-center justify-center group">
                            <IconWhatsApp className="w-8 h-8 group-hover:rotate-12 transition-transform" />
                        </a>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<EcomedanoApp />);
    </script>
</body>
</html>
